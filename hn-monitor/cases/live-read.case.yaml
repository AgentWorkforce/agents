schemaVersion: 1
id: hn-monitor.live-read
agent: ../agent.ts
kind: scheduled
event:
  schedule: scan
inputs:
  SLACK_CHANNEL: C123
  TOPICS: agents,ai,typescript
  LOOKBACK_HOURS: "24"
  MAX_STORIES: "8"
# HN_API_BASE_URL is injected by the acceptance harness via process.env so live
# GETs reach only the declared local mock server, never the external network.
policy:
  reads: live
  writes: preview
  model: stub
  shell: simulate
  compose: preview
expect:
  status: succeeded
  eventSource: cron
  logsContain:
    - hn-monitor.feed-scan front_page=2 show_hn=2 new=4
    - hn-monitor.matched-agentic matched=3
    - hn-monitor.posted
  effectsContain:
    - http.read
    - model.complete
    - provider.write
  providerActions:
    - provider: slack
      resource: messages
      channel: C123
      threaded: true
      textContains:
        - Agent
