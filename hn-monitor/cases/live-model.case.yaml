schemaVersion: 1
id: hn-monitor.live-model
agent: ../agent.ts
kind: scheduled
event:
  schedule: scan
inputs:
  SLACK_CHANNEL: C123
  TOPICS: agents,ai,typescript
  LOOKBACK_HOURS: "24"
  MAX_STORIES: "8"
policy:
  reads: fixtures
  writes: preview
  model: live
  shell: simulate
  compose: preview
http:
  - method: GET
    match: tags=front_page
    file: ../fixtures/hn-front-page.json
  - method: GET
    match: tags=show_hn
    file: ../fixtures/hn-show-hn.json
  - method: GET
    match: tags=story
    file: ../fixtures/hn-new.json
expect:
  status: succeeded
  eventSource: cron
  logsContain:
    - hn-monitor.feed-scan front_page=2 show_hn=2 new=4
    - hn-monitor.matched-agentic matched=3
    - hn-monitor.posted
  effectsContain:
    - http.read
    - model.complete
    - provider.write
  providerActions:
    - provider: slack
      resource: messages
      channel: C123
      threaded: true
      textContains:
        - HN discussion
